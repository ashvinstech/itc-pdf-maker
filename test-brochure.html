
    <!doctype html>
    <html>
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
          @page {
            size: A4;
            margin: 14mm;
          }

          * {
            box-sizing: border-box;
          }

          body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            color: #0f172a;
            margin: 0;
          }

          .page {
            min-height: 1000px;
          }

          .coverPage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
          }

          .coverLogo {
            margin-bottom: 8px;
          }

          .coverLogo img {
            max-height: 120px;
            max-width: 300px;
            object-fit: contain;
          }

          .coverTitle {
            font-size: 42px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            text-align: center;
            padding: 0 18px;
          }

          .banner {
            width: 100%;
            background: #1d3f7b;
            border-radius: 12px;
            padding: 14px 18px;
          }

          .bannerTitle {
            color: #ffffff;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.2px;
            text-transform: uppercase;
          }

          .pageLogo {
            padding: 0 18px 12px 18px;
            text-align: center;
          }

          .pageLogo img {
            max-height: 60px;
            max-width: 200px;
            object-fit: contain;
          }

          .content {
            padding-top: 12px;
          }

          .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            align-content: start;
          }

          .content.single .grid {
            grid-template-columns: 1fr;
            max-width: 360px;
            margin: 0 auto;
          }

          .product {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 200px;
          }

          .imgWrap {
            height: 245px;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0px;
          }

          .imgWrap img {
            width: 100%;
            height: 100%;
            max-width: none;
            max-height: none;
            object-fit: cover;
          }

          .meta {
            padding: 10px 10px 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
          }

          .name {
            font-weight: 800;
            font-size: 13px;
            line-height: 1.2;
            min-height: 30px;
          }

          .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 12px;
            color: #334155;
          }

          .price {
            font-weight: 800;
            color: #0f172a;
          }

          .pageBreak {
            page-break-after: always;
          }
        </style>
      </head>
